name: Bug Report
description: Report a bug in engram
labels: ["bug", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in all required fields below.
        **Before submitting**, check if a similar issue already exists.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Run `engram ...`
        2. Then do ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and output.
      placeholder: Instead, what happened was...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running?
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: engram-version
    attributes:
      label: Engram Version
      description: Run `engram version` to get the version.
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent / Client
      description: Which AI agent or client are you using engram with?
      options:
        - Claude Code
        - OpenCode
        - Gemini CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs that might help.
    validations:
      required: false
